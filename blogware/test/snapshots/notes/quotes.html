<meta content="width=device-width, initial-scale=1" name="viewport"><meta name="author" content="Roman Kashitsyn"><meta name="tdm-reservation" content="0"><title>Quotes</title><link rel="preload" href="/fonts/LibertinusSans-Regular.woff2" as="font" type="font/woff2" crossorigin=""><link rel="preload" href="/fonts/LibertinusSans-Bold.woff2" as="font" type="font/woff2" crossorigin=""><link rel="preload" href="/fonts/LibertinusSerif-Regular.woff2" as="font" type="font/woff2" crossorigin=""><link rel="preload" href="/fonts/LibertinusSerif-Bold.woff2" as="font" type="font/woff2" crossorigin=""><link rel="stylesheet" href="/css/mmapped.css"><link rel="icon" href="/images/favicon.svg"><link rel="mask-icon" href="/images/mask-icon.svg" color="#000000"></head><body><header><nav><ul><li><a class="blog-title" href="/index.html"><img class="logo grayscale" src="/images/logo.svg" alt="logo: circled capital letter M">mmap(blog)</a></li><li><a href="/posts.html">Posts</a></li><li><a href="/notes/index.html">Notes</a></li><li><a href="/feed.xml">Feed</a></li></ul></nav></header><hr><article><h1 class="note-title"><a href="/notes/quotes.html">Quotes</a></h1><span class="post-attrs"><span class="attr-date" title="First published"><span class="icon">✑</span><time datetime="2026-06-03">2026-06-03</time></span></span>
<section><figure class="bq left-gutter-anchor"><blockquote><p>In my vision the computer acts as a transitional object
  to mediate relationships that are ultimately between person and person.</p></blockquote><figcaption><span class="bibref-author">Seymour A. Papert</span>, <cite>Mindstorms</cite></figcaption></figure>
<figure class="bq left-gutter-anchor"><blockquote><p>Programs must be written for people to read,
  and only incidentally for machines to execute.</p></blockquote><figcaption><span class="bibref-author">Harold Abelson, Gerald Jay Sussman, Julie Sussman</span>, <cite>Structure and Interpretation of Computer Programs</cite></figcaption></figure>
<figure class="bq left-gutter-anchor"><blockquote><p>Human beings learn by doing and by thinking about what they have done.</p></blockquote><figcaption><span class="bibref-author">John R. Pierce</span>, <cite>An Introduction to Information Theory</cite></figcaption></figure>
<figure class="bq left-gutter-anchor"><blockquote><p>Great painters are often less skillful than mediocre painters;
  it is their concept of painting—not their skills—that defines their activity.</p></blockquote><figcaption><span class="bibref-author">Francis-Noël Thomas, Mark Turner</span>, <cite>Clear and Simple as the Truth</cite></figcaption></figure>
<figure class="bq left-gutter-anchor"><blockquote><p>You get no competitive edge from consuming the same stuff everyone else is consuming.</p></blockquote><figcaption><span class="bibref-author">Derek Sivers</span>, <cite>Hell Yeah or No</cite></figcaption></figure>
<figure class="bq left-gutter-anchor"><blockquote><p>Hit songwriters often admit that their most successful hit song was one they thought was just stupid,
  even not worth recording.
  We’re clearly bad judges of our own creations.
  We should just put them out there and let the world decide.</p></blockquote><figcaption><span class="bibref-author">Derek Sivers</span>, <cite>Hell Yeah or No</cite></figcaption></figure>
<figure class="bq left-gutter-anchor"><blockquote><p>In Wrzesniewski’s research,
  the happiest, most passionate employees
  are not those who followed their passion into a position,
  but instead those who have been around long enough
  to become good at what they do.</p></blockquote><figcaption><span class="bibref-author">Cal Newport</span>, <cite>So Good They Can't Ignore You</cite></figcaption></figure>
<figure class="bq left-gutter-anchor"><blockquote><p>When you take a job
  take a long look at the people
  you’re going to be working with—because
  the odds are
  you’re going to become like them;
  they are not going to become like you.
  You can’t change them.
  If it doesn’t fit who you are,
  it’s not going to work.</p></blockquote><figcaption><span class="bibref-author">Eric Barker</span>, <cite>Barking Up the Wrong Tree</cite></figcaption></figure>
<figure class="bq left-gutter-anchor"><blockquote><p>There’s nothing more effective for adopting new behaviors
  than surrounding yourself with people who already have them.</p></blockquote><figcaption><span class="bibref-author">Tiago Forte</span>, <cite>Building a Second Brain</cite></figcaption></figure>
<figure class="bq left-gutter-anchor"><blockquote><p>An ideal world is left as an exercise to the reader.</p></blockquote><figcaption><span class="bibref-author">Paul Graham</span>, <cite>On Lisp</cite>, <span class="bibref-postnote">p. 109</span></figcaption></figure>
<figure class="bq left-gutter-anchor"><blockquote><p>You can’t go by what a girl says,
  when she’s giving you the devil for making a chump of yourself.
  It’s like Shakespeare.
  Sounds well, but doesn’t mean anything.</p></blockquote><figcaption><span class="bibref-author">P.G. Wodehouse</span>, <cite>Joy in the Morning</cite></figcaption></figure>
<figure class="bq left-gutter-anchor"><blockquote><p>Arrakis teaches the attitude of the knife—chopping off
  what’s incomplete and saying:
  <q>Now, it’s complete because it’s ended here.</q></p></blockquote><figcaption><span class="bibref-author">Frank Herbert</span>, <cite>Dune</cite></figcaption></figure>
<figure class="bq left-gutter-anchor"><blockquote><p>The urge to excel and the urge to lead aren’t the same.
  Sometimes I think they may be opposites.</p></blockquote><figcaption><span class="bibref-author">Kim Stanley Robinson</span>, <cite>Red Mars</cite></figcaption></figure>
</section>
